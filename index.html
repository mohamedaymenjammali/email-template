<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Basic reset for email clients */
        body { margin: 0; padding: 0; width: 100% !important; background-color: #f4f4f4; }
        img {src:"https://images.unsplash.com/photo-1774893582522-c8e9c0aeaec9?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        table { border-collapse: collapse !important; }
    </style>
</head>
<body>
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f4f4f4;">
        <tr>
            <td align="center" style="padding: 20px 0;">
                
                <table border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                    
                    <tr>
                        <td align="center">
                            <img src="https://via.placeholder.com/600x200" alt="Hero Image" width="600" style="display: block; width: 100%; max-width: 600px;">
                        </td>
                    </tr>

                    <tr>
                        <td style="padding: 40px; color: #333333; font-family: Arial, sans-serif; font-size: 16px; line-height: 24px;">
                            <h1 style="margin: 0 0 20px 0; font-size: 24px;">Welcome to the Team!</h1>
                            <p style="margin: 0;">We are thrilled to have a new developer on board. This template was built using table logic to ensure it looks great in every inbox.</p>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding: 0 40px 40px 40px;">
                            <table border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td align="center" bgcolor="#3498db" style="border-radius: 5px;">
                                        <a href="#" target="_blank" style="font-size: 16px; font-family: Arial, sans-serif; color: #ffffff; text-decoration: none; padding: 15px 25px; display: inline-block; font-weight: bold;">Get Started</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                </table> </td>
        </tr>
    </table> </body>
</html>
